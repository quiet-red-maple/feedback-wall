<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

      content="生活吐槽墙：记录生活里的吐槽、建议与赞赏。发帖、点赞、评论，分享真实体验。"
    />
    <meta name="keywords" content="吐槽墙,树洞,生活吐槽,建议,赞赏,点赞,反馈" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="生活吐槽墙" />

      property="og:description"
      content="生活吐槽墙：记录生活里的吐槽、建议与赞赏。发帖、点赞、评论，分享真实体验。"
    />
    <meta property="og:url" content="%VITE_SITE_URL%" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="生活吐槽墙" />

      name="twitter:description"
      content="生活吐槽墙：记录生活里的吐槽、建议与赞赏。发帖、点赞、评论，分享真实体验。"
    />
    <meta name="twitter:image" content="/favicon.svg" />
    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "生活吐槽墙",
        "url": "%VITE_SITE_URL%",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "%VITE_SITE_URL%/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
